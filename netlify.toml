[build]
  base = "."
  package = "apps/web"
  command = "npm install --legacy-peer-deps && npm --prefix apps/web install --legacy-peer-deps && npm --prefix apps/web run build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_DISABLE_NETLIFY_EDGE = "true"
  NPM_FLAGS = "--legacy-peer-deps"

[context.production.environment]
  NODE_ENV = "production"
  NEXT_PUBLIC_APP_URL = "https://tinashe-life.netlify.app"
  NEXT_PUBLIC_API_URL = "https://api.tinashe.life"
  NEXT_PUBLIC_SOCKET_URL = "https://api.tinashe.life"
  NEXTAUTH_URL = "https://tinashe-life.netlify.app"

[context.deploy-preview.environment]
  NODE_ENV = "production"

[context.branch-deploy.environment]
  NODE_ENV = "production"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://meet.jit.si; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://tinashe-life.netlify.app https://tinashe.life https://api.tinashe.life wss://api.tinashe.life https://api.stripe.com https://meet.jit.si https://*.sentry.io https://*.livekit.cloud wss://*.livekit.cloud; frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://meet.jit.si; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests; block-all-mixed-content"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "same-site"
    X-DNS-Prefetch-Control = "off"
    X-Permitted-Cross-Domain-Policies = "none"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Credentials = "true"
    Access-Control-Allow-Headers = "Authorization, Content-Type"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Origin = "https://tinashe-life.netlify.app"

[[redirects]]
  from = "/api/*"
  to = "https://api.tinashe.life/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "https://www.tinashe.life/*"
  to = "https://tinashe.life/:splat"
  status = 301
  force = true
