[build]
  base = "."
  package = "apps/web"
  command = "npm install --legacy-peer-deps && npm --prefix apps/web install --legacy-peer-deps && npm --prefix apps/web run build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_DISABLE_NETLIFY_EDGE = "true"
  NPM_FLAGS = "--legacy-peer-deps"

[context.production.environment]
  NODE_ENV = "production"
  NEXT_PUBLIC_APP_URL = "https://tinashe.life"
  NEXT_PUBLIC_API_URL = "http://mainline.proxy.rlwy.net:45270"

[context.deploy-preview.environment]
  NODE_ENV = "production"

[context.branch-deploy.environment]
  NODE_ENV = "production"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https: http:; connect-src 'self' https://api-production-11b4.up.railway.app http://mainline.proxy.rlwy.net:45270 wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Credentials = "true"
    Access-Control-Allow-Headers = "Authorization, Content-Type"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Origin = "https://tinashe.life"

[[redirects]]
  from = "/api/*"
  to = "http://mainline.proxy.rlwy.net:45270/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "https://www.tinashe.life/*"
  to = "https://tinashe.life/:splat"
  status = 301
  force = true
