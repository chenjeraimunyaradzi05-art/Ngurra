[build]
  base = "."
  package = "apps/web"
  command = "echo '🔧 Installing dependencies...' && npm install --legacy-peer-deps --prefer-offline --no-audit && npm --prefix apps/api install --legacy-peer-deps --prefer-offline --no-audit && npm --prefix apps/web install --legacy-peer-deps --prefer-offline --no-audit && echo '🗄️ Generating Prisma client...' && npm --prefix apps/api run db:generate && echo '🏗️ Building web app...' && npm --prefix apps/web run build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_DISABLE_NETLIFY_EDGE = "true"
  NPM_FLAGS = "--legacy-peer-deps"
  # Neon Database - Auto-injected by Netlify Neon Integration
  # Fallback order: NETLIFY_DATABASE_URL > NEON_DATABASE_URL > DATABASE_URL
  DATABASE_URL = ""
  NEON_DATABASE_URL = ""
  NETLIFY_DATABASE_URL = ""

# ─────────────────────────────────────────────────────────────────────────────
# Neon PostgreSQL Integration
# ─────────────────────────────────────────────────────────────────────────────
# HOW TO CONNECT NEON (automatic):
#   1. Go to Netlify Dashboard → Integrations → Neon
#   2. Click "Enable" — Netlify will create or link your Neon database
#   3. Netlify auto-injects NETLIFY_DATABASE_URL into every build & function
#   4. The API reads it automatically via databaseEnv.ts (no extra config needed)
#
# HOW TO CONNECT NEON (manual via env var):
#   Netlify Dashboard → Site Settings → Environment Variables → Add:
#     NEON_DATABASE_URL = postgresql://user:pass@ep-xxx.aws.neon.tech/neondb?sslmode=require
#   Then the API picks it up automatically (NEON_DATABASE_URL is in the fallback chain).
# ─────────────────────────────────────────────────────────────────────────────

[context.production.environment]
  NODE_ENV = "production"
  NEXT_PUBLIC_APP_URL = "https://tinashe-life.netlify.app"
  NEXT_PUBLIC_API_URL = "https://api.tinashe.life"
  NEXT_PUBLIC_SOCKET_URL = "https://api.tinashe.life"
  NEXTAUTH_URL = "https://tinashe-life.netlify.app"

[context.deploy-preview.environment]
  NODE_ENV = "production"

[context.branch-deploy.environment]
  NODE_ENV = "production"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://meet.jit.si; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com https://r2cdn.perplexity.ai; img-src 'self' data: blob: https:; connect-src 'self' https://tinashe-life.netlify.app https://tinashe.life https://api.tinashe.life wss://api.tinashe.life https://api.stripe.com https://meet.jit.si https://*.sentry.io https://*.livekit.cloud wss://*.livekit.cloud https://*.neon.tech wss://*.neon.tech https://neon.tech; frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://meet.jit.si; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests; block-all-mixed-content"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Embedder-Policy = "unsafe-none"
    Cross-Origin-Resource-Policy = "same-site"
    X-DNS-Prefetch-Control = "off"
    X-Permitted-Cross-Domain-Policies = "none"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=(), payment=(self https://js.stripe.com), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Credentials = "true"
    Access-Control-Allow-Headers = "Authorization, Content-Type"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Origin = "https://tinashe-life.netlify.app"

[[redirects]]
  from = "/api/*"
  to = "https://api.tinashe.life/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "https://www.tinashe.life/*"
  to = "https://tinashe.life/:splat"
  status = 301
  force = true
