version: '3.8'

# =====================================
# DEVELOPMENT ONLY - NOT FOR PRODUCTION
# =====================================
# For production, use docker-compose.production.yml which:
# - Does not expose database ports to host
# - Requires proper secrets management
# - Has resource limits and security options

services:
  postgres:
    image: postgres:16-alpine
    environment:
      # SECURITY: These are development defaults only
      # In production, use docker-compose.production.yml with proper secrets
      POSTGRES_USER: ${POSTGRES_USER:-ngurra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env file}
      POSTGRES_DB: ${POSTGRES_DB:-ngurra_dev}
      # Performance tuning
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      # WARNING: Only exposed for local development
      # Production removes this - database only accessible within Docker network
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ngurra} -d ${POSTGRES_DB:-ngurra_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env file} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      # WARNING: Only exposed for local development
      # Production removes this - Redis only accessible within Docker network
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
